<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>IT資格 学習アプリ</title>
<!-- iPhoneホーム画面アプリ対応 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IT学習">
<meta name="theme-color" content="#0f172a">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bg: #0f172a; --card: #1e293b; --card2: #273449;
    --text: #e2e8f0; --muted: #94a3b8; --accent: #38bdf8;
    --accent2: #22c55e; --wrong: #ef4444; --gold: #fbbf24; --border: #334155;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.7;
    padding: 16px; max-width: 720px; margin: 0 auto;
  }
  h1 { font-size: 1.3rem; margin-bottom: 4px; }
  .sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 16px; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px 10px; text-align: center; }
  .stat .num { font-size: 1.6rem; font-weight: 700; }
  .stat .label { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
  .streak .num { color: var(--gold); } .rate .num { color: var(--accent2); }

  .panel { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 14px; }
  .panel-title { font-size: 0.8rem; color: var(--muted); margin-bottom: 8px; }
  .pills { display: flex; flex-wrap: wrap; gap: 8px; }
  .pill {
    flex: 1; min-width: 60px; padding: 12px 0; text-align: center; cursor: pointer;
    border: 1px solid var(--border); border-radius: 10px; background: var(--card2);
    color: var(--text); font-weight: 600; font-size: 0.95rem;
  }
  .pill.active { background: var(--accent); color: #0f172a; border-color: var(--accent); }
  select {
    width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--card2); color: var(--text); font-size: 0.95rem;
  }

  .btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 12px;
    font-size: 1rem; font-weight: 600; cursor: pointer; margin-bottom: 10px; color: #0f172a;
    background: var(--accent); transition: transform .05s, opacity .2s; }
  .btn:active { transform: scale(0.98); }
  .btn.secondary { background: var(--card2); color: var(--text); border: 1px solid var(--border); }
  .btn.review { background: var(--gold); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .quiz-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; }
  .progress-bar { height: 6px; background: var(--card2); border-radius: 99px; overflow: hidden; margin-bottom: 14px; }
  .progress-bar > div { height: 100%; background: var(--accent); transition: width .3s; }
  .q-meta { font-size: 0.78rem; color: var(--muted); margin-bottom: 8px; }
  .q-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 16px; white-space: pre-wrap; }
  .choice { display: block; width: 100%; text-align: left; padding: 13px 14px;
    border: 1px solid var(--border); border-radius: 12px; background: var(--card2);
    color: var(--text); font-size: 0.98rem; cursor: pointer; margin-bottom: 10px; }
  .choice:hover:not(:disabled) { border-color: var(--accent); }
  .choice.correct { background: rgba(34,197,94,.18); border-color: var(--accent2); }
  .choice.wrong { background: rgba(239,68,68,.18); border-color: var(--wrong); }
  .choice:disabled { cursor: default; }
  .explain { margin-top: 6px; padding: 13px; border-radius: 12px; background: var(--card2);
    border-left: 4px solid var(--accent); font-size: 0.9rem; display: none; }
  .explain.show { display: block; }
  .explain .verdict { font-weight: 700; margin-bottom: 4px; }
  .v-ok { color: var(--accent2); } .v-ng { color: var(--wrong); }
  .result { text-align: center; padding: 20px; }
  .result .big { font-size: 2.4rem; font-weight: 700; color: var(--accent); }
  .hidden { display: none; }
  footer { text-align: center; color: var(--muted); font-size: 0.72rem; margin-top: 24px; }
  a.link { color: var(--accent); cursor: pointer; }
  input.f { width:100%; padding:10px; margin-bottom:8px; border-radius:8px; border:1px solid var(--border); background:var(--card2); color:var(--text); }
</style>
</head>
<body>

<h1>📘 IT資格 学習アプリ</h1>
<p class="sub">ITパスポート・基本情報技術者の四択対策。ランダム出題でコツコツ。</p>

<!-- ホーム -->
<div id="home">
  <div class="stats">
    <div class="stat streak"><div class="num" id="s-streak">0</div><div class="label">🔥 連続日数</div></div>
    <div class="stat rate"><div class="num" id="s-rate">--</div><div class="label">通算正解率</div></div>
    <div class="stat"><div class="num" id="s-total">0</div><div class="label">累計回答数</div></div>
  </div>

  <div class="panel">
    <div class="panel-title">出題分野</div>
    <select id="catSel"></select>
  </div>

  <div class="panel">
    <div class="panel-title">一度に出す問題数</div>
    <div class="pills" id="countPills">
      <div class="pill" data-n="10">10問</div>
      <div class="pill active" data-n="20">20問</div>
      <div class="pill" data-n="50">50問</div>
      <div class="pill" data-n="100">100問</div>
    </div>
  </div>

  <button class="btn" onclick="startQuiz('all')">▶ クイズを始める（ランダム）</button>
  <button class="btn review" id="reviewBtn" onclick="startQuiz('review')">🔁 間違えた問題を復習</button>
  <button class="btn secondary" onclick="toggleAdd()">＋ 問題を追加する</button>
  <p class="sub" id="bankInfo" style="text-align:center"></p>

  <div id="addForm" class="quiz-card hidden">
    <div class="q-meta">新しい問題を追加</div>
    <input class="f" id="f-q" placeholder="問題文">
    <input class="f" id="f-c0" placeholder="選択肢1（これを正解にします）" style="border-color:var(--accent2)">
    <input class="f" id="f-c1" placeholder="選択肢2">
    <input class="f" id="f-c2" placeholder="選択肢3">
    <input class="f" id="f-c3" placeholder="選択肢4">
    <input class="f" id="f-exp" placeholder="解説（任意）">
    <button class="btn" onclick="addQuestion()">保存する</button>
    <p class="sub" style="margin:0">※選択肢1が正解。出題時に順番はシャッフルされます。</p>
  </div>
</div>

<!-- クイズ -->
<div id="quiz" class="hidden">
  <div class="quiz-card">
    <div class="progress-bar"><div id="prog"></div></div>
    <div class="q-meta" id="q-meta"></div>
    <div class="q-text" id="q-text"></div>
    <div id="choices"></div>
    <div class="explain" id="explain">
      <div class="verdict" id="verdict"></div>
      <div id="explain-text"></div>
    </div>
    <button class="btn hidden" id="nextBtn" onclick="nextQuestion()">次へ ▶</button>
  </div>
  <button class="btn secondary" style="margin-top:10px" onclick="goHome()">やめてホームに戻る</button>
</div>

<!-- 結果 -->
<div id="result" class="hidden">
  <div class="quiz-card result">
    <p>今回の結果</p>
    <div class="big"><span id="r-score"></span></div>
    <p id="r-msg" style="margin:10px 0;color:var(--muted)"></p>
    <button class="btn" onclick="goHome()">ホームに戻る</button>
  </div>
</div>

<footer>データはこのブラウザ内に保存されます（自分専用）。<br><a class="link" onclick="resetAll()">学習データをリセット</a></footer>

<!-- QUESTIONS_START -->
<!-- questions data: auto-generated by build.ps1 from questions-*.js (do not edit by hand) -->
<script>
window.QUESTIONS = [];
// questions-1.js … ITパスポート テクノロジ系（ハードウェア/ソフトウェア/基礎理論）
// 形式: {c:分野, q:問題文, a:[正解, 誤1, 誤2, 誤3], e:解説}
window.QUESTIONS.push(
  {c:"IP テクノロジ", q:"CPUが1秒間に処理する基本動作の回数を表す指標は何か。", a:["クロック周波数", "ビット深度", "解像度", "スループット"], e:"クロック周波数(Hz)はCPUの動作テンポを表す。高いほど高速に処理できる傾向がある。"},
  {c:"IP テクノロジ", q:"電源を切ると記憶内容が消える揮発性のメモリはどれか。", a:["RAM", "ROM", "SSD", "光ディスク"], e:"RAMは揮発性の主記憶。ROM・SSD・光ディスクは不揮発性で電源を切っても内容が残る。"},
  {c:"IP テクノロジ", q:"電源を切っても内容が保持される、読み出し専用が基本のメモリはどれか。", a:["ROM", "RAM", "キャッシュメモリ", "レジスタ"], e:"ROMは不揮発性メモリ。RAM・キャッシュ・レジスタは揮発性。"},
  {c:"IP テクノロジ", q:"CPUと主記憶の速度差を埋めるために置かれる高速な記憶装置はどれか。", a:["キャッシュメモリ", "仮想記憶", "補助記憶", "レジスタファイル"], e:"キャッシュメモリはCPUと主記憶の間に位置し、よく使うデータを保持して処理を高速化する。"},
  {c:"IP テクノロジ", q:"主記憶の容量不足を補うため、補助記憶の一部を主記憶のように使う仕組みはどれか。", a:["仮想記憶", "キャッシュ", "デフラグ", "ミラーリング"], e:"仮想記憶は補助記憶を一時的に主記憶として扱い、見かけ上のメモリ容量を増やす。"},
  {c:"IP テクノロジ", q:"2進数の1桁を表す情報量の最小単位はどれか。", a:["ビット", "バイト", "ワード", "ヘルツ"], e:"1ビットは0か1の2通りを表す。8ビット=1バイト。"},
  {c:"IP テクノロジ", q:"8ビットは何バイトか。", a:["1バイト", "8バイト", "16バイト", "0.5バイト"], e:"8ビット=1バイト。1バイトで256通り(2の8乗)を表現できる。"},
  {c:"IP テクノロジ", q:"2進数「1010」を10進数で表すといくつか。", a:["10", "8", "12", "20"], e:"1010 = 8+0+2+0 = 10。各桁は8,4,2,1の重み。"},
  {c:"IP テクノロジ", q:"10進数「13」を2進数で表すとどれか。", a:["1101", "1011", "1110", "1001"], e:"13 = 8+4+0+1 = 1101。"},
  {c:"IP テクノロジ", q:"記憶容量の単位を小さい順に正しく並べたものはどれか。", a:["KB→MB→GB→TB", "MB→KB→GB→TB", "GB→MB→KB→TB", "TB→GB→MB→KB"], e:"小さい順にKB(キロ)→MB(メガ)→GB(ギガ)→TB(テラ)。約1000倍ずつ増える。"},
  {c:"IP テクノロジ", q:"周辺機器を接続するとOSが自動的に認識・設定する仕組みはどれか。", a:["プラグアンドプレイ", "デフラグ", "マルチタスク", "ホットスタンバイ"], e:"プラグアンドプレイは機器を挿すだけで使える状態にする仕組み。"},
  {c:"IP テクノロジ", q:"周辺機器を動作させるためにOSへ組み込む専用ソフトウェアはどれか。", a:["デバイスドライバ", "ファームウェア", "コンパイラ", "ミドルウェア"], e:"デバイスドライバはプリンタやマウスなどの機器をOSが制御するためのソフト。"},
  {c:"IP テクノロジ", q:"パソコンやサーバなど、コンピュータの基本動作を管理する基本ソフトウェアはどれか。", a:["OS", "アプリケーション", "コンパイラ", "ファームウェア"], e:"OS(オペレーティングシステム)はハードウェアとアプリの橋渡しをする基本ソフト。"},
  {c:"IP テクノロジ", q:"複数の処理を短い時間で切り替えて同時に進んでいるように見せるOSの機能はどれか。", a:["マルチタスク", "デュアルブート", "ミラーリング", "ストライピング"], e:"マルチタスクはCPUの時間を細かく分けて複数の処理を並行実行する。"},
  {c:"IP テクノロジ", q:"ハードディスク上で断片化したファイルを並べ直し、読み書きを効率化する作業はどれか。", a:["デフラグ", "フォーマット", "圧縮", "暗号化"], e:"デフラグ(最適化)は分散したデータを連続領域に整理してアクセスを高速化する。"},
  {c:"IP テクノロジ", q:"複数台のハードディスクをまとめ、信頼性や速度を高める技術はどれか。", a:["RAID", "VPN", "RFID", "VLAN"], e:"RAIDは複数ディスクを組み合わせ、冗長化や高速化を実現する技術。"},
  {c:"IP テクノロジ", q:"同じデータを2台のディスクに書き込み、片方が壊れても継続できるRAID方式はどれか。", a:["ミラーリング(RAID1)", "ストライピング(RAID0)", "RAID5", "JBOD"], e:"ミラーリングは同じ内容を2台に書く冗長方式。片方故障でもデータが残る。"},
  {c:"IP テクノロジ", q:"データを複数ディスクに分散して書き込み、速度を高めるが冗長性のないRAID方式はどれか。", a:["ストライピング(RAID0)", "ミラーリング(RAID1)", "RAID5", "RAID6"], e:"ストライピングは分散書き込みで高速だが、1台故障で全体が失われる。"},
  {c:"IP テクノロジ", q:"画像を点(ドット)の集まりで表現する形式はどれか。", a:["ラスタ(ビットマップ)", "ベクタ", "テキスト", "バイナリ"], e:"ラスタ形式はドットの集合で表現。拡大すると粗くなる。代表例はJPEG・PNG。"},
  {c:"IP テクノロジ", q:"点や線を数式で表現し、拡大しても劣化しない画像形式はどれか。", a:["ベクタ", "ラスタ", "ビットマップ", "JPEG"], e:"ベクタ形式は図形を数式で表すため拡大しても滑らか。ロゴや図面に向く。"},
  {c:"IP テクノロジ", q:"色を光の三原色で表現する方式で使う3色はどれか。", a:["赤・緑・青", "赤・黄・青", "シアン・マゼンタ・イエロー", "白・黒・灰"], e:"光の三原色はRGB(赤緑青)。加法混色で、すべて混ぜると白になる。"},
  {c:"IP テクノロジ", q:"文字に固有の番号を割り当て、コンピュータで扱えるようにした規格はどれか。", a:["文字コード", "ハッシュ値", "チェックサム", "MACアドレス"], e:"文字コードは文字と数値の対応規則。代表例にUnicode、Shift_JIS。"},
  {c:"IP テクノロジ", q:"世界中の文字を統一的に扱うことを目的とした文字コードはどれか。", a:["Unicode", "ASCII", "EUC-JP", "Shift_JIS"], e:"Unicodeは世界中の文字を共通の番号で表す規格。UTF-8などの符号化方式がある。"},
  {c:"IP テクノロジ", q:"プログラムの誤りを見つけて修正する作業を何というか。", a:["デバッグ", "コンパイル", "リファクタリング", "デプロイ"], e:"デバッグはバグ(誤り)を取り除く作業。"},
  {c:"IP テクノロジ", q:"人が書いたソースコードを機械語に一括変換するソフトウェアはどれか。", a:["コンパイラ", "インタプリタ", "エディタ", "リンカ"], e:"コンパイラはソースをまとめて機械語に翻訳する。インタプリタは1行ずつ解釈実行する。"},
  {c:"IP テクノロジ", q:"処理の手順や流れを図記号で表現したものはどれか。", a:["フローチャート", "ガントチャート", "ER図", "散布図"], e:"フローチャートは処理の流れを矢印と記号で示す図。"},
  {c:"IP テクノロジ", q:"条件によって処理を分ける制御構造はどれか。", a:["選択(分岐)", "順次", "繰返し(反復)", "再帰"], e:"プログラムの基本制御構造は順次・選択・繰返しの3つ。選択は条件分岐。"},
  {c:"IP テクノロジ", q:"同じ処理を条件が満たされる間くり返す制御構造はどれか。", a:["繰返し(ループ)", "順次", "選択", "例外処理"], e:"繰返し(ループ)は条件を満たす間、処理をくり返す構造。"},
  {c:"IP テクノロジ", q:"プログラムで値を一時的に格納する入れ物を何というか。", a:["変数", "定数", "関数", "演算子"], e:"変数は値を入れて後から変更できる入れ物。定数は変更できない値。"},
  {c:"IP テクノロジ", q:"複数のデータを順番に並べてまとめて扱うデータ構造はどれか。", a:["配列", "変数", "ポインタ", "オブジェクト"], e:"配列は同じ型のデータを連番(添字)で管理するデータ構造。"},
  {c:"IP テクノロジ", q:"AIが大量のデータからパターンを学び、判断や予測の精度を高める技術はどれか。", a:["機械学習", "仮想化", "正規化", "符号化"], e:"機械学習はデータから規則性を学習し、予測・分類を行うAI技術。"},
  {c:"IP テクノロジ", q:"人間の脳の神経回路を模した多層構造で学習する手法はどれか。", a:["ディープラーニング", "クラスタリング", "線形回帰", "決定木"], e:"ディープラーニング(深層学習)は多層のニューラルネットワークで複雑な特徴を学習する。"},
  {c:"IP テクノロジ", q:"あらゆる機器をインターネットに接続し、相互に情報をやり取りする概念はどれか。", a:["IoT", "VPN", "VR", "CRM"], e:"IoT(Internet of Things)はモノのインターネット。家電やセンサ等をネット接続する。"},
  {c:"IP テクノロジ", q:"現実の映像にデジタル情報を重ねて表示する技術はどれか。", a:["AR(拡張現実)", "VR(仮想現実)", "MR", "CG"], e:"AR(拡張現実)は現実世界にデジタル情報を重ねる。VRは完全な仮想空間を体験する。"},
  {c:"IP テクノロジ", q:"コンピュータ上に作られた仮想空間に没入する技術はどれか。", a:["VR(仮想現実)", "AR(拡張現実)", "OCR", "RPA"], e:"VRは仮想現実。ヘッドセット等で仮想空間に入り込む体験を提供する。"},
  {c:"IP テクノロジ", q:"定型的なPC操作を自動化するソフトウェアによる仕組みはどれか。", a:["RPA", "CRM", "ERP", "SFA"], e:"RPA(Robotic Process Automation)はソフトのロボットが事務作業を自動化する。"},
  {c:"IP テクノロジ", q:"紙の文書を読み取り、文字データに変換する技術はどれか。", a:["OCR", "OMR", "RFID", "GPS"], e:"OCR(光学文字認識)は印刷・手書き文字を画像から文字データに変換する。"},
  {c:"IP テクノロジ", q:"少ない情報量からデータの欠落を補い、ファイルサイズを小さくする処理はどれか。", a:["圧縮", "暗号化", "正規化", "符号化"], e:"圧縮はデータ量を減らす処理。可逆圧縮と非可逆圧縮がある。"},
  {c:"IP テクノロジ", q:"圧縮後に元のデータへ完全に戻せる圧縮方式はどれか。", a:["可逆圧縮", "非可逆圧縮", "差分圧縮", "ストリーミング"], e:"可逆圧縮は完全復元できる(ZIP等)。非可逆圧縮は一部情報を捨てる(JPEG等)。"},

<script>
// ====== データ管理 ======
const LS = {
  get user() { return JSON.parse(localStorage.getItem("it_userq") || "[]"); },
  set user(v) { localStorage.setItem("it_userq", JSON.stringify(v)); },
  get stats() { return JSON.parse(localStorage.getItem("it_stats") || '{"total":0,"correct":0,"lastDate":null,"streak":0,"wrong":[]}'); },
  set stats(v) { localStorage.setItem("it_stats", JSON.stringify(v)); }
};

// 全問題プール（ファイル由来 + ユーザー追加）。形式: {c,q,a:[正解,誤,誤,誤],e}
function allQuestions() {
  return (window.QUESTIONS || []).concat(LS.user);
}
let selectedCount = 20;
let selectedCat = "all";

function todayStr() { const d = new Date(); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }
function dayDiff(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
function shuffle(arr){ return arr.map(x=>[Math.random(),x]).sort((a,b)=>a[0]-b[0]).map(x=>x[1]); }

// ====== ホーム ======
function renderHome() {
  const s = LS.stats;
  document.getElementById("s-streak").textContent = s.streak;
  document.getElementById("s-rate").textContent = s.total ? Math.round(s.correct/s.total*100)+"%" : "--";
  document.getElementById("s-total").textContent = s.total;
  document.getElementById("reviewBtn").disabled = (s.wrong||[]).length === 0;
  document.getElementById("reviewBtn").textContent = "🔁 間違えた問題を復習（"+(s.wrong||[]).length+"問）";

  // 分野セレクト
  const cats = [...new Set(allQuestions().map(q=>q.c).filter(Boolean))].sort();
  const sel = document.getElementById("catSel");
  if (sel.options.length === 0) {
    const optAll = document.createElement("option"); optAll.value="all"; optAll.textContent="すべての分野";
    sel.appendChild(optAll);
    cats.forEach(c => { const o=document.createElement("option"); o.value=c; o.textContent=c; sel.appendChild(o); });
    sel.onchange = () => selectedCat = sel.value;
  }
  document.getElementById("bankInfo").textContent = "収録問題数：" + allQuestions().length + " 問";
}

// 出題数ピル
document.getElementById("countPills").addEventListener("click", e => {
  const p = e.target.closest(".pill"); if (!p) return;
  document.querySelectorAll("#countPills .pill").forEach(x=>x.classList.remove("active"));
  p.classList.add("active");
  selectedCount = parseInt(p.dataset.n, 10);
});

// ====== クイズ ======
let session = { list: [], idx: 0, score: 0, answered: false, mode: "all" };

function startQuiz(mode) {
  const all = allQuestions();
  let pool;
  if (mode === "review") {
    const wrongQ = LS.stats.wrong || [];
    pool = all.filter(q => wrongQ.includes(q.q));
  } else {
    pool = selectedCat === "all" ? all.slice() : all.filter(q => q.c === selectedCat);
  }
  if (pool.length === 0) { alert("出題できる問題がありません。"); return; }
  const n = mode === "review" ? pool.length : selectedCount;
  session = { list: shuffle(pool).slice(0, n), idx: 0, score: 0, answered: false, mode };
  show("quiz");
  renderQuestion();
}

function renderQuestion() {
  const item = session.list[session.idx];
  session.answered = false;
  document.getElementById("q-meta").textContent =
    "第 "+(session.idx+1)+" 問 / "+session.list.length+" 問" + (item.c ? "　[" + item.c + "]" : "");
  document.getElementById("prog").style.width = (session.idx/session.list.length*100)+"%";
  document.getElementById("q-text").textContent = item.q;

  const correctText = item.a[0];
  const box = document.getElementById("choices");
  box.innerHTML = "";
  shuffle(item.a).forEach(text => {
    const b = document.createElement("button");
    b.className = "choice"; b.textContent = text;
    b.onclick = () => answer(b, text === correctText, correctText, item);
    box.appendChild(b);
  });
  document.getElementById("explain").className = "explain";
  document.getElementById("nextBtn").className = "btn hidden";
}

function answer(btn, isCorrect, correctText, item) {
  if (session.answered) return;
  session.answered = true;
  document.querySelectorAll("#choices .choice").forEach(b => {
    b.disabled = true;
    if (b.textContent === correctText) b.classList.add("correct");
  });
  if (!isCorrect) btn.classList.add("wrong");

  const s = LS.stats;
  s.total++;
  if (isCorrect) { s.correct++; session.score++; s.wrong = (s.wrong||[]).filter(x => x !== item.q); }
  else { s.wrong = s.wrong || []; if (!s.wrong.includes(item.q)) s.wrong.push(item.q); }
  LS.stats = s;

  const v = document.getElementById("verdict");
  v.textContent = isCorrect ? "◎ 正解！" : "✕ 不正解";
  v.className = "verdict " + (isCorrect ? "v-ok" : "v-ng");
  document.getElementById("explain-text").textContent = item.e || "";
  document.getElementById("explain").className = "explain show";
  document.getElementById("nextBtn").className = "btn";
}

function nextQuestion() {
  session.idx++;
  if (session.idx >= session.list.length) finishQuiz();
  else renderQuestion();
}

function finishQuiz() {
  const s = LS.stats; const today = todayStr();
  if (s.lastDate !== today) {
    if (s.lastDate && dayDiff(s.lastDate, today) === 1) s.streak++;
    else s.streak = 1;
    s.lastDate = today;
  }
  LS.stats = s;
  show("result");
  document.getElementById("r-score").textContent = session.score+" / "+session.list.length;
  const pct = session.score/session.list.length;
  const msg = pct===1 ? "全問正解！すばらしい 🎉" : pct>=0.7 ? "good！この調子 👍" : "復習で確実にしよう 💪";
  document.getElementById("r-msg").textContent = msg + "　🔥 連続 "+s.streak+" 日";
}

// ====== 問題追加 ======
function toggleAdd(){ document.getElementById("addForm").classList.toggle("hidden"); }
function addQuestion() {
  const q = document.getElementById("f-q").value.trim();
  const c = [0,1,2,3].map(i=>document.getElementById("f-c"+i).value.trim());
  if (!q || c.some(x=>!x)) { alert("問題文と選択肢4つを入力してください。"); return; }
  const list = LS.user;
  list.push({ c:"自作問題", q, a:c, e:document.getElementById("f-exp").value.trim() });
  LS.user = list;
  ["f-q","f-c0","f-c1","f-c2","f-c3","f-exp"].forEach(id=>document.getElementById(id).value="");
  alert("追加しました！（自作 "+list.length+" 問）");
  toggleAdd(); renderHome();
}

// ====== 画面 ======
function show(id){ ["home","quiz","result"].forEach(x=>document.getElementById(x).classList.add("hidden")); document.getElementById(id).classList.remove("hidden"); }
function goHome(){ renderHome(); show("home"); }
function resetAll(){
  if (confirm("学習データ（統計・自作問題）を消します。よろしいですか？")) {
    localStorage.removeItem("it_userq"); localStorage.removeItem("it_stats");
    goHome();
  }
}
renderHome();
</script>
